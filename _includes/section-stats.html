{% assign _lang = page.lang | default: 'nl' %}{% assign s = site.data.strings[_lang] %}
<section class="section section--navy" id="{{ s.stats_id }}" aria-labelledby="stats-h2">
  <div class="container">
    <p class="section-label section-label--light">{{ s.stats_label }}</p>
    <h2 class="section-h2 section-h2--light" id="stats-h2">{{ s.stats_h2 }}</h2>
    <div class="stats-row">
      <div class="stat">
        <span class="stat-number">{{ s.stats_1_number }}</span>
        <span class="stat-label">{{ s.stats_1_label }}</span>
      </div>
      <div class="stat">
        <span class="stat-number">{{ s.stats_2_number }}</span>
        <span class="stat-label">{{ s.stats_2_label }}</span>
      </div>
      <div class="stat">
        <span class="stat-number">{{ s.stats_3_number }}</span>
        <span class="stat-label">{{ s.stats_3_label }}</span>
      </div>
    </div>
  </div>
</section>
