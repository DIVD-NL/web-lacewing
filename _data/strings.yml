  # Hero
  hero_label: "Een initiatief van"
  hero_headline: "Het internet is van iedereen. De verdediging ook."
  hero_sub: "Project Lacewing is het Europese, open antwoord op AI-gedreven kwetsbaarheidsonderzoek — door DIVD, transparant en non-profit."
  hero_cta_primary: "Doe mee"
  hero_cta_primary_url: "#meedoen"
  hero_cta_secondary: "Lees meer"
  hero_cta_secondary_url: "#achtergrond"
  hero_tagline: "Vernoemd naar de gaasvlieg (Chrysopidae) — net als de glasswingvlinder, maar van nature een bestrijder van plagen."

  # Section 2: Context
  context_id: "achtergrond"
  context_label: "Achtergrond"
  context_h2: "Glasswing is een stap vooruit — maar voor wie?"
  context_body: |
    Op 7 april 2026 lanceerde Anthropic <strong>Project Glasswing</strong> — een grootschalig initiatief waarbij AI wordt ingezet om kwetsbaarheden te vinden en te fixen in kritieke software. Klinkt goed. En dat is het ook, deels.
    <br><br>
    Maar kijk wie er aan tafel zit: Amazon, Apple, Microsoft, Google, NVIDIA, JPMorgan, Cisco — en de Linux Foundation. De beslissingen over <em>wát</em> er onderzocht wordt, <em>wát</em> er gefixed wordt en <em>wíe</em> er van profiteert, liggen grotendeels in handen van een handvol Amerikaanse techbedrijven en investeerders. Toegang tot het onderliggende model kost na de preview-periode $25–$125 per miljoen tokens.
  context_quote: "Als Europa dit overlaat aan anderen, heeft Europa niets meer te zeggen over de veiligheid van haar eigen digitale infrastructuur."
  context_quote_attribution: "— Uit de Project Lacewing pitch"
  context_divd_intro: "DIVD heeft iets wat geen enkel Glasswing-partner heeft:"
  context_divd_track: "een trackrecord van onafhankelijk, non-profit, responsible disclosure — zonder agenda behalve het internet veiliger maken."

  # Section 3: What DIVD can do
  divd_id: "wat-divd-doet"
  divd_label: "Ons voorstel"
  divd_h2: "Project Lacewing: een Europees antwoord"
  divd_intro: "Geen gesloten clubje. Geen proprietary modellen waar we van afhankelijk zijn. Maar gerichte inzet van AI om kwetsbaarheden te vinden én op te lossen."
  divd_card1_title: "AI-capaciteit opbouwen"
  divd_card1_body: "Fondsen werven voor AI-tokens en lokaal draaiende open-source modellen — inclusief de hardware waarop ze draaien."
  divd_card2_title: "Geautomatiseerd onderzoek"
  divd_card2_body: "AI inzetten voor kwetsbaarheidsonderzoek op de schaal die DIVD aankan, maar slimmer en sneller dan ooit."
  divd_card3_title: "Open samenwerking"
  divd_card3_body: "Bedrijven dragen bij met geld, hardware, menskracht of codebase-toegang — en committeren zich aan het fixen van wat we vinden."
  divd_card4_title: "Responsible Disclosure"
  divd_card4_body: "Alles wat we vinden en leren, delen we — maar verantwoordelijk. Eerst de betrokken partij, dan de wereld. Zoals altijd."

  # Section 4: Why now
  why_id: "waarom-nu"
  why_label: "De urgentie"
  why_h2: "Waarom nu"
  why_body: |
    De drempel voor het vinden van kwetsbaarheden is structureel aan het dalen. Wat Glasswing aantoont is dat AI al beter is dan de meeste mensen in het vinden van bugs die al tien, twintig, soms dertig jaar in kritieke software zitten. Dat gaat niet terugdraaien.
    <br><br>
    Als we nu niets doen, is het antwoord over twee jaar: een handvol Amerikaanse bedrijven, een paar Aziatische staatsactoren, en de criminelen die ze inhalen.
  why_quote: "De vraag is niet óf deze capaciteiten er komen. De vraag is wie ze in handen heeft."
  why_conclusion: "DIVD kan een derde weg zijn — transparant, onafhankelijk, Europees."

  # Section 5: Stats
  stats_id: "divd-in-cijfers"
  stats_label: "DIVD in cijfers"
  stats_h2: "Een bewezen trackrecord"
  stats_1_number: "189"
  stats_1_label: "vrijwilligers"
  stats_2_number: "193"
  stats_2_label: "cases afgehandeld"
  stats_3_number: "1,4M"
  stats_3_label: "kwetsbare IP's genotificeerd"

  # Section 6: Contribute
  contribute_id: "meedoen"
  contribute_label: "Doe mee"
  contribute_h2: "Wat we nodig hebben"
  contribute_intro: "Dit project kan niet slagen zonder substantiële funding. Financiering op een schaal die DIVD tot nu toe niet heeft kunnen bereiken, want AI modellen draaien en trainen is niet goedkoop. Maar het alternatief is toekijken hoe anderen de standaard zetten."
  contribute_card1_title: "Technisch"
  contribute_card1_body: "Help nadenken over de technische opzet: welke modellen, welke hardware, welke targets."
  contribute_card1_cta: "Meld je aan"
  contribute_card2_title: "Fondsenwerving"
  contribute_card2_body: "Help met fondsenwerving: subsidies, partners en donateurs vinden en benaderen."
  contribute_card2_cta: "Meld je aan"
  contribute_card3_title: "Champion"
  contribute_card3_body: "Draag dit mede uit, help het te leiden en geef het gezicht naar buiten."
  contribute_card3_cta: "Meld je aan"
  contribute_closing: "Het internet is van iedereen. Laten we zorgen dat de verdediging dat ook is."
  contribute_donate_label: "Steun Project Lacewing"
  contribute_contact_label: "Neem contact op"

  # Partners
