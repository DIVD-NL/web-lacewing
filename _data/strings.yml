  partners_label: "Onze partners"
  partners_h2: "Partners"
  partners_intro: "Organisaties die Project Lacewing steunen met funding, hardware, menskracht of toegang tot codebases."
  partners_empty: "Partners worden binnenkort aangekondigd."

