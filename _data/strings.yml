# Section 2: Context
context_id: "background"
context_label: "Background"
context_h2: "Glasswing is a step forward — but for whom?"
context_body: |
  On April 7, 2026, Anthropic launched <strong>Project Glasswing</strong> — a large-scale initiative using AI to find and fix vulnerabilities in critical software. Sounds great. And it is, partly.
  <br><br>
  But look who's at the table: Amazon, Apple, Microsoft, Google, NVIDIA, JPMorgan, Cisco — and the Linux Foundation. The decisions about <em>what</em> gets investigated, <em>what</em> gets fixed, and <em>who</em> benefits are largely in the hands of a small group of American tech companies and investors. After the preview period, access to the underlying model costs $25–$125 per million tokens.
context_quote: "If Europe leaves this to others, Europe loses its voice in the security of its own digital infrastructure."
context_quote_attribution: "— From the Project Lacewing pitch"
context_divd_intro: "DIVD has something no Glasswing partner has:"
context_divd_track: "a track record of independent, non-profit, responsible disclosure — with no agenda other than making the internet safer."

# Section 3: What DIVD can do
divd_id: "what-divd-does"
divd_label: "Our proposal"
divd_h2: "Project Lacewing: a European answer"
divd_intro: "No closed club. No proprietary models we depend on. Instead, targeted use of AI to find and fix vulnerabilities in critical software."
divd_card1_title: "Build AI capacity"
divd_card1_body: "Raise funds to invest in AI tokens and locally running open-source models — including the hardware to run them on."
divd_card2_title: "Automated research"
divd_card2_body: "Deploy AI for vulnerability research at the scale DIVD can handle, but smarter and faster than ever."
divd_card3_title: "Open collaboration"
divd_card3_body: "Companies contribute money, hardware, people, or codebase access — and commit to fixing what we find."
divd_card4_title: "Responsible Disclosure"
divd_card4_body: "Everything we find and learn, we share — but responsibly. The affected party first, then the world. As always."

# Section 4: Why now
why_id: "why-now"
why_label: "The urgency"
why_h2: "Why now"
why_body: |
  The barrier to finding vulnerabilities is structurally dropping. What Glasswing demonstrates is that AI is already better than most humans at finding bugs that have sat undetected in critical software for ten, twenty, sometimes thirty years. That's not going to reverse.
  <br><br>
  If we do nothing, the answer in two years will be: a handful of American companies, a few Asian state actors, and the criminals catching up with them.
why_quote: "The question isn't whether these capabilities are coming. The question is who has them."
why_conclusion: "DIVD can be a third way — transparent, independent, European."

